<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    
    <title>WeatherSnap</title>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-900 p-4">
    <div class="w-11/12 sm:w-3/4 max-w-md min-h-[600px] bg-blue-700 flex flex-col rounded-xl p-6">
        <header class="flex justify-center flex-col">
            <h1 class="text-amber-700">WeatherSnap</h1>
            <ul>
                <li>
                    <div>
                        <img src="" alt="Icone para voltar ao inicio">
                        <p>Inicio</p>
                    </div>
                </li>
                <li>
                    <div>
                        <img src="" alt="Icone para Comparar">
                        <p>Comparar</p>
                    </div>
                </li>
            </ul>
        </header>
        <main>
            <section>
                <form id="formulario" action="">
                    <input class="input input-primary" id="nome-cidade" type="text" placeholder="Buscar cidade">
                    <button type="submit">Buscar</button>
                    <button class="btn btn-outline hover:btn-soft">Botão DaisyUI</button>
                </form>
                <div>
                    <h2 id="cidade"></h2>
                    <h3 id="data"></h3>
                </div>
                <div>
                    <a href="#"><img src="" alt=""></a>
                    <a href="#"><img src="" alt=""></a>
                </div>
                <div>
                    <img id="emoji-tempo" src="" alt="">
                    <h3 id="temperatura"></h3>
                    <h4 id="informacao-tempo"></h4>
                    <div>
                        <p id="vento"></p>
                        <p id="precipitacao"></p>
                    </div>
                    <h3 id="dica"></h3>
                </div>
            </section>

            <section id="flex">
                <h3>Próximos dias</h3>
                <div class="card-proximo w-30 min-h-30 flex flex-col" >
                    <p id="dia-1"></p>
                    <img id="tempo-1" src="" alt="">
                    <p id="temperatura-1"></p>
                </div>
                <div>
                    <p id="dia-2"></p>
                    <img id="tempo-2" src="" alt="">
                    <p id="temperatura-2"></p>
                </div>
                <div>
                    <p id="dia-3"></p>
                    <img id="tempo-3" src="" alt="">
                    <p id="temperatura-3"></p>
                </div>
            </section>
        </main>
    
    </div>
    <script src="script.js"></script>
</body>
</html>
